<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMOWATSUT • DOKKADON</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #0a0a0a;
            --card-bg: #141414;
            --border: rgba(255, 255, 255, 0.05);
            --text-secondary: #888;
            --fb-color: #00a2ed;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Navigation --- */
        .top-nav {
            padding: 15px 5%;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            position: absolute;
            width: 100%;
            z-index: 100;
        }

        .nav-btn { 
            color: #fff; 
            text-decoration: none; 
            cursor: pointer; 
            font-size: 0.8rem; 
            font-weight: 500; 
            opacity: 0.7;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover { opacity: 1; }

        /* --- Hero Section --- */
        .hero-section { 
            text-align: center; 
            padding: 80px 20px 40px; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }
        .main-logo { width: 120px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        .hero-title { 
            font-family: 'Orbitron'; 
            font-size: 2.5rem; 
            letter-spacing: 12px; 
            text-transform: uppercase; 
            font-weight: 700;
            margin-bottom: 5px;
        }
        .hero-subtitle { 
            font-size: 0.7rem; 
            color: var(--text-secondary); 
            letter-spacing: 5px; 
            text-transform: uppercase;
        }

        /* --- Stats & Search --- */
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 20px; }
        
        .search-area { margin-bottom: 40px; }
        .search-box { position: relative; max-width: 600px; margin: 0 auto 20px; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #444; }
        .search-box input {
            width: 100%; padding: 12px 15px 12px 45px; background: #111; border: 1px solid #222;
            border-radius: 30px; color: #fff; outline: none; transition: var(--transition);
        }
        .search-box input:focus { border-color: #444; background: #151515; }

        .filter-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .f-btn {
            background: #111; border: 1px solid #222; color: #666;
            padding: 6px 18px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; 
            font-weight: 600; transition: var(--transition);
        }
        .f-btn.active { background: #f1c40f; color: #000; border-color: #f1c40f; }

        /* --- Member Grid (Wellesley Layout) --- */
        .section-label { 
            text-align: center; 
            font-family: 'Orbitron'; 
            font-size: 0.9rem; 
            margin-bottom: 30px; 
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .section-label::before, .section-label::after { content: ""; height: 1px; width: 50px; background: #222; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding-bottom: 60px;
        }

        @media (max-width: 992px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }

        .member-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
        }
        .member-card:hover { border-color: #333; transform: translateY(-2px); background: #1a1a1a; }

        .avatar-wrapper {
            width: 65px; height: 65px; border-radius: 50%; padding: 3px;
            border: 1.5px solid #333; flex-shrink: 0;
        }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .member-info { flex: 1; overflow: hidden; }
        .member-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .meta-tags { display: flex; align-items: center; gap: 10px; }
        .role-tag { 
            background: #2a2a2a; color: #fff; padding: 3px 10px; border-radius: 6px;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
        }
        .fb-btn { color: var(--fb-color); text-decoration: none; font-size: 0.85rem; transition: 0.2s; }
        .fb-btn:hover { opacity: 0.8; }

        /* --- Admin UI --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .admin-window { background: #0f0f0f; width: 100%; max-width: 700px; max-height: 90vh; border-radius: 20px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        .admin-header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .admin-body { padding: 20px; overflow-y: auto; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        
        input, select { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #222; 
            color: #fff; border-radius: 10px; margin-top: 5px; font-family: inherit;
        }
        label { font-size: 0.7rem; color: #666; text-transform: uppercase; font-weight: 700; }
        
        .btn-main { 
            width: 100%; padding: 15px; background: #fff; color: #000; border: none; 
            border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { background: #ddd; }

        .admin-list-item {
            display: flex; justify-content: space-between; padding: 12px;
            background: #151515; border-radius: 10px; margin-bottom: 8px; font-size: 0.8rem;
        }

        footer { padding: 40px; text-align: center; font-size: 0.6rem; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-house"></i> MEMBERS</a>
        <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-lock"></i> ADMIN</a>
    </nav>

    <header class="hero-section">
        <img src="" alt="" class="main-logo" id="siteLogo">
        <h1 class="hero-title">WELLESLEY</h1>
        <p class="hero-subtitle">SINCE 2024</p>
    </header>

    <div class="container">
        <div class="search-area">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search member name..." onkeyup="renderMembers()">
            </div>
            <div class="filter-group" id="filterArea"></div>
        </div>

        <div class="section-label">
            MEMBERS (<span id="countNumber">0</span>)
        </div>

        <div class="grid-container" id="memberList">
            </div>
    </div>

    <footer>
        © 2026 WELLESLEY GANG. ALL RIGHTS RESERVED.
    </footer>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 350px;">
            <div class="admin-body" style="text-align: center;">
                <h3 style="margin-bottom: 20px; font-family: 'Orbitron';">ADMIN LOGIN</h3>
                <input type="password" id="adminPass" placeholder="Enter Password" style="text-align: center; margin-bottom: 20px;">
                <button class="btn-main" onclick="handleLogin()">ACCESS SYSTEM</button>
                <p onclick="closeModals()" style="margin-top: 20px; color: #444; cursor: pointer; font-size: 0.7rem;">CANCEL</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div class="admin-header">
                <h3 style="font-family: 'Orbitron'; font-size: 1rem;">DATABASE MANAGEMENT</h3>
                <i class="fa-solid fa-xmark" onclick="closeModals()" style="cursor: pointer;"></i>
            </div>
            <div class="admin-body">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div>
                        <label>Display Name</label>
                        <input type="text" id="mName" placeholder="e.g. Aef Wellesley">
                    </div>
                    <div>
                        <label>Facebook Link</label>
                        <input type="text" id="mFB" placeholder="URL">
                    </div>
                    <div class="full-width">
                        <label>Avatar Image URL</label>
                        <input type="text" id="mImg" placeholder="https://...">
                    </div>
                    <div class="full-width">
                        <label>Assign Categories</label>
                        <div id="mRoleCheckboxes" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px;"></div>
                    </div>
                </div>
                
                <button class="btn-main" id="saveBtn" onclick="saveMember()" style="margin-bottom: 30px;">SAVE CHANGES</button>

                <label style="display: block; margin-bottom: 10px;">Quick Settings</label>
                <div class="form-grid" style="margin-bottom: 30px;">
                    <input type="text" id="setLogo" placeholder="Site Logo URL">
                    <input type="color" id="setTheme" style="height: 45px; cursor: pointer;">
                    <button class="btn-main" onclick="saveSettings()" style="grid-column: span 2; padding: 10px;">UPDATE SITE STYLE</button>
                </div>

                <label>Manage Existing Members</label>
                <div id="adminMemberList" style="margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;
        const defaultCats = ["Leader", "Member", "Wellesley", "Kodomo"];

        // --- Auth & Modals ---
        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') { isAdmin = true; closeModals(); openAdmin(); } 
            else { alert("Access Denied"); }
        }

        // --- Data Handling ---
        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if(data) {
                if(data.logoUrl) document.getElementById('siteLogo').src = data.logoUrl;
                if(data.themeColor) document.documentElement.style.setProperty('--accent', data.themeColor);
            }
        });

        async function saveSettings() {
            const logo = document.getElementById('setLogo').value;
            const color = document.getElementById('setTheme').value;
            await db.ref('settings').update({ logoUrl: logo, themeColor: color });
            alert("Styles Updated!");
        }

        function renderCategories() {
            let filterHtml = `<button class="f-btn active" onclick="setFilter('all', this)">All</button>`;
            let checkHtml = '';
            defaultCats.forEach(name => {
                filterHtml += `<button class="f-btn" onclick="setFilter('${name}', this)">${name}</button>`;
                checkHtml += `<label style="font-size:0.6rem; color:#888; display:flex; align-items:center; gap:5px;"><input type="checkbox" name="roles" value="${name}"> ${name}</label>`;
            });
            document.getElementById('filterArea').innerHTML = filterHtml;
            document.getElementById('mRoleCheckboxes').innerHTML = checkHtml;
        }

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `
                <div class="admin-list-item">
                    <span>${m.name}</span>
                    <div>
                        <i class="fa-solid fa-pen" onclick="editMember('${id}')" style="color: #00a2ed; cursor: pointer; margin-right: 15px;"></i>
                        <i class="fa-solid fa-trash" onclick="deleteMember('${id}')" style="color: #ff4d4d; cursor: pointer;"></i>
                    </div>
                </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            renderMembers();
        });

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);
            const data = {
                name: document.getElementById('mName').value,
                role: roles,
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("Name is required");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = false);
            document.getElementById('saveBtn').innerText = "SAVE CHANGES";
        }

        function editMember(id) {
            const m = allMembers.find(i => i.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            const roles = Array.isArray(m.role) ? m.role : [m.role];
            document.querySelectorAll('input[name="roles"]').forEach(cb => cb.checked = roles.includes(cb.value));
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER";
        }

        async function deleteMember(id) { if(confirm("Delete this member?")) await db.ref('members/'+id).remove(); }
        
        function setFilter(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return m.name.toLowerCase().includes(search) && (currentFilter==='all' || roles.includes(currentFilter));
            });
            document.getElementById('countNumber').innerText = filtered.length;
            document.getElementById('memberList').innerHTML = filtered.map(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return `
                <div class="member-card">
                    <div class="avatar-wrapper">
                        <img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                    <div class="member-info">
                        <h3>${m.name}</h3>
                        <div class="meta-tags">
                            <span class="role-tag">${roles[0] || 'Member'}</span>
                            <a href="${m.facebook}" target="_blank" class="fb-btn"><i class="fa-brands fa-facebook"></i> Facebook</a>
                        </div>
                    </div>
                </div>`
            }).join('');
        }

        renderCategories();
    </script>
</body>
</html>
