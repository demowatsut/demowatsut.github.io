<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-secondary: #aaa;
            --fb-color: #00a2ed;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); /* Smooth transition */
            --sunlight: rgba(255, 230, 150, 0.08); /* แสงแดดอ่อนๆ */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sunlight & Atmos --- */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--sunlight) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
            filter: blur(50px);
            animation: sunPulse 8s ease-in-out infinite alternate;
        }

        @keyframes sunPulse {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.1); }
        }

        /* --- UI Elements --- */
        .member-count-badge {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 101;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 101;
            background: #fff;
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255,255,255,0.1);
            transition: var(--transition);
        }
        .music-control:hover { transform: scale(1.1) rotate(15deg); }
        .music-control.playing i { animation: rotate 3s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .top-nav {
            padding: 20px 5%;
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            position: fixed;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        .nav-btn { 
            color: #fff; text-decoration: none; cursor: pointer; font-size: 0.7rem; font-weight: 600; 
            opacity: 0.5; transition: var(--transition); display: flex; align-items: center; gap: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .nav-btn:hover { opacity: 1; transform: translateY(-2px); text-shadow: 0 0 10px #fff; }

        .hero-section { 
            text-align: center; padding: 180px 20px 100px; 
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            position: relative;
        }
        
        .main-logo { 
            width: 120px;
            height: auto; 
            margin-bottom: 30px; 
            filter: drop-shadow(0 0 40px rgba(255,255,255,0.15)); 
            animation: float 6s ease-in-out infinite;
            transition: var(--transition);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .hero-title { 
            font-family: 'Orbitron'; font-size: clamp(2.2rem, 6vw, 4rem); 
            letter-spacing: 15px; text-transform: uppercase; font-weight: 700; margin-bottom: 15px; 
            background: linear-gradient(to bottom, #fff 40%, #777 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        .hero-subtitle { font-size: 0.75rem; color: var(--text-secondary); letter-spacing: 7px; text-transform: uppercase; opacity: 0.6; }

        .container { max-width: 1300px; margin: 0 auto; width: 100%; padding: 0 40px; position: relative; z-index: 2; }
        
        .search-area { margin-bottom: 70px; animation: slideUp 1s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .search-box { position: relative; max-width: 500px; margin: 0 auto 35px; }
        .search-box input { 
            width: 100%; padding: 18px 24px 18px 55px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); border-radius: 18px; color: #fff; outline: none;
            transition: var(--transition); font-size: 0.9rem;
        }
        .search-box input:focus { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.3); box-shadow: 0 0 30px rgba(255,255,255,0.05); }
        .search-box i { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: #666; font-size: 1.1rem; }

        .f-btn { 
            background: transparent; border: 1px solid var(--border); color: #777; padding: 12px 28px; 
            border-radius: 12px; cursor: pointer; font-size: 0.7rem; font-weight: 700; 
            text-transform: uppercase; transition: var(--transition); letter-spacing: 1.5px;
        }
        .f-btn:hover { border-color: #555; color: #aaa; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding-bottom: 120px; }
        
        .member-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; 
            padding: 28px; display: flex; align-items: center; gap: 22px; 
            transition: var(--transition); backdrop-filter: blur(12px);
            position: relative; overflow: hidden;
        }
        /* แสงวิ่งผ่าน Card */
        .member-card::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.8s;
        }
        .member-card:hover::after { left: 150%; }

        .member-card:hover { 
            border-color: rgba(255,255,255,0.2); 
            transform: translateY(-10px) scale(1.02); 
            background: rgba(255, 255, 255, 0.06); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .avatar-wrapper { 
            width: 85px; height: 85px; border-radius: 24px; padding: 4px; 
            border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; 
            overflow: hidden; transition: var(--transition);
        }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; filter: grayscale(30%); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .member-card:hover img { filter: grayscale(0%); transform: scale(1.15) rotate(2deg); }
        .member-card:hover .avatar-wrapper { border-color: #fff; }

        .member-info h3 { font-size: 1.1rem; margin-bottom: 8px; font-weight: 700; letter-spacing: 0.5px; transition: var(--transition); }
        .member-card:hover h3 { color: #fff; transform: translateX(5px); }

        /* Modal Smoothness */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 1000; align-items: center; justify-content: center; padding: 20px; 
            backdrop-filter: blur(25px); transition: var(--transition);
        }
        .admin-window { 
            background: #080808; width: 100%; max-width: 650px; 
            border-radius: 32px; border: 1px solid #1a1a1a; 
            transform: scale(0.9); transition: var(--transition); opacity: 0;
        }
        .modal[style*="display: flex"] .admin-window { transform: scale(1); opacity: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

    </style>
</head>
<body>

    <div class="member-count-badge">MEMBERS <span id="countNum">0</span></div>

    <div class="music-control" id="musicBtn" onclick="toggleMusic()">
        <i class="fa-solid fa-compact-disc fa-lg"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <div id="customToast" style="display: none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 30px; border-radius: 50px; z-index: 2000; font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">ACTION SUCCESSFUL</div>

    <nav class="top-nav">
        <a class="nav-btn" onclick="setFilter('all')"><i class="fa-solid fa-globe"></i> ALL</a>
        <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-shield-halved"></i> SYSTEM</a>
    </nav>

    <header class="hero-section">
        <img src="" alt="LOGO" class="main-logo" id="siteLogo">
        <h1 class="hero-title" id="siteNameDisplay">GHETTOTROPHY</h1>
        <p class="hero-subtitle" id="siteSubDisplay">LOADING PREFERENCES...</p>
    </header>

    <div class="container">
        <div class="search-area">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search members by name..." onkeyup="renderMembers()">
            </div>
            <div class="filter-group" id="filterArea"></div>
        </div>
        <div id="memberList" class="grid-container"></div>
    </div>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 350px;">
            <div class="admin-body" style="text-align: center; padding: 40px;">
                <h3 style="font-family: 'Orbitron'; margin-bottom: 25px; font-size: 1rem; letter-spacing: 2px;">ACCESS KEY</h3>
                <input type="password" id="adminPass" placeholder="••••••••" style="text-align: center; background: #000; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 12px; width: 100%;">
                <button class="btn-main" onclick="handleLogin()" style="width: 100%; margin-top: 15px; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer;">ENTER SYSTEM</button>
                <p onclick="closeModals()" style="margin-top: 25px; cursor: pointer; font-size: 0.6rem; opacity: 0.4; letter-spacing: 2px;">BACK TO HOME</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div class="admin-header" style="padding: 25px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px;">SYSTEM CONTROL</h2>
                <i class="fa-solid fa-xmark" onclick="closeModals()" style="cursor:pointer; opacity:0.5;"></i>
            </div>
            <div class="admin-body" style="padding: 30px; max-height: 70vh; overflow-y: auto;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="font-size: 0.6rem; color: #555; text-transform: uppercase; font-weight: 700;">Site Name</label>
                    <input type="text" id="confName" style="width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; margin-top: 8px;">
                </div>
                <button class="btn-main" onclick="saveConfig()" style="width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <script>
        // --- ส่วน JavaScript ของคุณเหมือนเดิมได้เลยครับ ---
        // (Copy JS logic from your original code here)
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let siteConfig = {};
        let currentFilter = 'all';
        let isAdmin = false;
        const defaultCats = ["GHETTOTROPHY"];

        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicBtn.classList.add('playing');
            } else {
                audio.pause();
                musicBtn.classList.remove('playing');
            }
        }

        function showToast(text) {
            const toast = document.getElementById('customToast');
            toast.innerText = text;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') { 
                isAdmin = true; closeModals(); openAdmin(); 
            } else { alert("Access Denied"); }
        }

        db.ref('config').on('value', snap => {
            const data = snap.val() || {};
            siteConfig = {
                name: data.name || 'GHETTOTROPHY',
                logo: data.logo || '',
                logoSize: data.logoSize || '120',
                subtitle: data.subtitle || 'Not a perfect gang but try to be the best.',
                music: data.music || ''
            };
            document.getElementById('siteNameDisplay').innerText = siteConfig.name;
            document.getElementById('pageTitle').innerText = siteConfig.name;
            document.getElementById('siteSubDisplay').innerText = siteConfig.subtitle;
            document.getElementById('bgMusic').src = siteConfig.music;
            const logoImg = document.getElementById('siteLogo');
            logoImg.src = siteConfig.logo;
            logoImg.style.width = siteConfig.logoSize + 'px';
        });

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let count = 0;
            for(let id in data) {
                allMembers.push({...data[id], id});
                count++;
            }
            document.getElementById('countNum').innerText = count;
            renderMembers();
        });

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                return m.name.toLowerCase().includes(search) && (currentFilter === 'all' || roles.includes(currentFilter));
            });

            document.getElementById('memberList').innerHTML = filtered.map(m => `
                <div class="member-card">
                    <div class="avatar-wrapper"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'"></div>
                    <div class="member-info">
                        <h3>${m.name}</h3>
                        <div style="display:flex; gap:12px; align-items:center;">
                            <span style="font-size:0.55rem; background:rgba(255,255,255,0.08); padding:4px 10px; border-radius:6px; letter-spacing:1px; color:#888; text-transform:uppercase; font-weight:700;">${Array.isArray(m.role) ? m.role[0] : m.role}</span>
                            <a href="${m.facebook}" target="_blank" style="color:var(--fb-color); font-size:1rem;"><i class="fa-brands fa-facebook"></i></a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setFilter(role) {
            currentFilter = role;
            renderMembers();
            document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-role') === role));
        }

        // Initialize categories
        let filterHtml = `<button class="f-btn active" data-role="all" onclick="setFilter('all')">ALL</button>`;
        defaultCats.forEach(name => {
            filterHtml += `<button class="f-btn" data-role="${name}" onclick="setFilter('${name}')">${name}</button>`;
        });
        document.getElementById('filterArea').innerHTML = filterHtml;

    </script>
</body>
</html>
