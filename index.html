<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --glow-color: rgba(255, 255, 255, 0.5);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --glass: rgba(20, 20, 20, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        #customAlert {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            background: var(--accent); color: #000; padding: 15px 30px;
            border-radius: 12px; font-weight: 700; display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .member-count {
            position: fixed; top: 25px; left: 25px; z-index: 101;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px;
            background: var(--glass); padding: 10px 20px; border-radius: 50px;
            backdrop-filter: blur(15px); border: 1px solid var(--border);
        }

        .top-nav { padding: 25px 5%; display: flex; justify-content: flex-end; position: fixed; width: 100%; z-index: 100; pointer-events: none; }
        .nav-btn { 
            pointer-events: auto; color: #fff; text-decoration: none; cursor: pointer; 
            font-size: 0.7rem; font-weight: 700; opacity: 0.6; transition: var(--transition); 
            letter-spacing: 2px; background: var(--glass); padding: 10px 20px; border-radius: 12px;
            border: 1px solid var(--border);
        }
        .nav-btn:hover { opacity: 1; border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

        .hero-section { padding: 140px 20px 60px; text-align: center; transition: var(--transition); }
        .hero-title { font-family: 'Orbitron'; font-size: clamp(2.5rem, 10vw, 5rem); letter-spacing: 15px; text-transform: uppercase; margin: 20px 0; font-weight: 700; }
        .glow-text { text-shadow: 0 0 25px var(--accent); color: var(--accent) !important; }

        /* GRID & CARD STYLES */
        .grid-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; padding: 40px 5%; max-width: 1400px; margin: 0 auto;
        }

        .member-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; 
            padding: 20px; display: flex; align-items: center; gap: 20px; transition: var(--transition);
            position: relative; overflow: hidden;
        }

        /* Card Type 2: Modern (Vertical) */
        .card-modern { flex-direction: column; text-align: center; padding: 30px 20px; }
        .card-modern .avatar-wrapper { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; }

        /* Card Type 3: Minimal */
        .card-minimal { background: none; border-left: 4px solid var(--accent); border-radius: 5px; }

        .member-card:hover { 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.07); 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar-wrapper { 
            width: 70px; height: 70px; border-radius: 15px; overflow: hidden; 
            border: 2px solid var(--border); flex-shrink: 0;
        }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .m-name { 
            font-family: 'Orbitron'; font-size: 1.1rem; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            max-width: 180px;
        }

        /* Modals */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; 
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .modal.active { display: flex; }

        .admin-window { 
            background: #111; width: 95%; max-width: 1200px; height: 90vh; border-radius: 30px; 
            border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden;
        }

        .admin-body { padding: 35px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .admin-body { grid-template-columns: 1fr; } }

        .admin-section { background: #181818; padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        h4 { color: var(--accent); font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        input, select { 
            background: #0d0d0d; border: 1px solid #222; color: #fff; padding: 12px; 
            border-radius: 10px; width: 100%; margin: 8px 0 18px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-primary { 
            background: var(--accent); color: #000; border: none; width: 100%; padding: 14px; 
            border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Orbitron'; font-size: 0.75rem;
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-primary:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .music-player { 
            position: fixed; bottom: 35px; right: 35px; z-index: 100; 
            background: var(--accent); color: #000; width: 55px; height: 55px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Style Preview Chips */
        .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .style-option { 
            padding: 15px; border: 1px solid #333; border-radius: 12px; text-align: center; cursor: pointer;
            font-size: 0.7rem; opacity: 0.5; transition: 0.3s;
        }
        .style-option.active { border-color: var(--accent); opacity: 1; background: rgba(255,193,7,0.05); }

    </style>
</head>
<body>

    <div id="customAlert">DONE</div>
    <div class="member-count">MEMBER: <span id="countNum">0</span></div>

    <div class="music-player" id="musicBtn" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <nav class="top-nav">
        <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-shield-halved"></i> CONTROL CENTER</a>
    </nav>

    <header class="hero-section">
        <img src="" id="siteLogo" style="margin-bottom: 25px; display: none;">
        <h1 class="hero-title" id="siteNameDisplay">GHETTO</h1>
        <p class="hero-subtitle" id="siteDescDisplay" style="opacity: 0.5; letter-spacing: 4px; text-transform: uppercase;">SYSTEM OPERATIONAL</p>
    </header>

    <div style="text-align: center; padding: 0 5% 40px;">
        <input type="text" id="searchInput" placeholder="SEARCH..." onkeyup="renderMembers()" 
               style="max-width: 500px; text-align: center; border-radius: 50px; background: var(--card-bg);">
        <div id="categoryFilter" style="display:flex; justify-content:center; flex-wrap: wrap; gap:10px; margin-top:10px;"></div>
    </div>

    <div id="memberList" class="grid-container"></div>

    <div id="loginModal" class="modal">
        <div style="background:#161616; padding:40px; border-radius:25px; width:350px; text-align:center;">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px;">AUTH</h2>
            <input type="password" id="adminPass" placeholder="Enter Access Code">
            <button class="btn-primary" onclick="handleLogin()">LOGIN</button>
            <p onclick="closeModals()" style="margin-top:20px; cursor:pointer; font-size:0.6rem; opacity:0.5;">CANCEL</p>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div style="padding:20px 30px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-family:'Orbitron'; color:var(--accent);">ADMIN DASHBOARD</span>
                <i class="fa-solid fa-xmark" onclick="closeModals()" style="cursor:pointer; font-size:1.2rem;"></i>
            </div>
            
            <div class="admin-body">
                <div class="admin-section">
                    <h4><i class="fa-solid fa-sliders"></i> GENERAL SETTINGS</h4>
                    <label>Site Title</label><input type="text" id="confName">
                    <label>Site Description (Sub-text)</label><input type="text" id="confDesc">
                    <label>Logo URL</label><input type="text" id="confLogo">
                    <label>Theme Color</label><input type="color" id="confColor" style="height:45px;">
                    
                    <h4 style="margin-top:20px;"><i class="fa-solid fa-music"></i> MUSIC SYSTEM</h4>
                    <label>MP3 URL / Stream</label><input type="text" id="confMusic">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" id="confAutoplay" style="width:auto;"> <span>Enable Autoplay (On Entry)</span>
                    </div>
                    <button class="btn-primary" onclick="saveConfig()" style="margin-top:15px;">SAVE CONFIG</button>
                </div>

                <div class="admin-section">
                    <h4><i class="fa-solid fa-palette"></i> CARD DESIGN</h4>
                    <div class="style-grid">
                        <div class="style-option" id="s_default" onclick="selectStyle('default')">
                            <i class="fa-solid fa-address-card" style="font-size:1.5rem; display:block; margin-bottom:5px;"></i> DEFAULT
                        </div>
                        <div class="style-option" id="s_modern" onclick="selectStyle('modern')">
                            <i class="fa-solid fa-id-badge" style="font-size:1.5rem; display:block; margin-bottom:5px;"></i> MODERN
                        </div>
                        <div class="style-option" id="s_minimal" onclick="selectStyle('minimal')">
                            <i class="fa-solid fa-square" style="font-size:1.5rem; display:block; margin-bottom:5px;"></i> MINIMAL
                        </div>
                    </div>

                    <h4><i class="fa-solid fa-user-plus"></i> MANAGE MEMBER</h4>
                    <input type="hidden" id="editId">
                    <input type="text" id="mName" placeholder="Display Name">
                    <select id="mRoleSelect"></select>
                    <input type="text" id="mImg" placeholder="Avatar/Image URL">
                    <input type="text" id="mFB" placeholder="Facebook Profile Link">
                    <div style="display:flex; gap:10px;">
                        <input type="checkbox" id="mGlow" style="width:auto;"> <span>Name Glow Effect</span>
                    </div>
                    <button class="btn-primary" id="saveBtn" onclick="saveMember()" style="margin-top:15px;">ADD MEMBER</button>

                    <div id="adminMemberList" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Database Init ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let siteConfig = {};
        let isAdmin = false;
        let selectedStyle = 'default';

        // --- Auth ---
        function openAdmin() {
            const modal = isAdmin ? document.getElementById('adminPanel') : document.getElementById('loginModal');
            modal.classList.add('active');
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function handleLogin() {
            if(document.getElementById('adminPass').value === '9871') {
                isAdmin = true; closeModals(); openAdmin(); showAlert("Admin Verified");
            } else alert("Wrong Code");
        }

        // --- Music Logic ---
        const audio = document.getElementById('bgMusic');
        function toggleMusic() {
            const icon = document.getElementById('musicIcon');
            if(audio.paused) {
                audio.play(); icon.className = 'fa-solid fa-pause';
            } else {
                audio.pause(); icon.className = 'fa-solid fa-play';
            }
        }

        // --- Config Management ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            siteConfig = d;
            
            // Apply UI
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTO';
            document.getElementById('siteDescDisplay').innerText = d.desc || 'SYSTEM OPERATIONAL';
            document.documentElement.style.setProperty('--accent', d.color || '#ffc107');
            selectedStyle = d.cardStyle || 'default';
            
            const logo = document.getElementById('siteLogo');
            if(d.logo) { logo.src = d.logo; logo.style.display = 'inline-block'; logo.style.width = '100px'; }
            
            // Admin Fields
            document.getElementById('confName').value = d.name || '';
            document.getElementById('confDesc').value = d.desc || '';
            document.getElementById('confLogo').value = d.logo || '';
            document.getElementById('confColor').value = d.color || '#ffc107';
            document.getElementById('confMusic').value = d.musicUrl || '';
            document.getElementById('confAutoplay').checked = d.autoplay || false;
            
            // Audio setup
            if(d.musicUrl && audio.src !== d.musicUrl) {
                audio.src = d.musicUrl;
                if(d.autoplay) {
                    // Browsers block autoplay without interaction, so we try:
                    const playAttempt = setInterval(() => {
                        audio.play().then(() => {
                            document.getElementById('musicIcon').className = 'fa-solid fa-pause';
                            clearInterval(playAttempt);
                        }).catch(() => {});
                    }, 2000);
                }
            }

            // Styles UI
            document.querySelectorAll('.style-option').forEach(opt => opt.classList.remove('active'));
            document.getElementById('s_' + selectedStyle).classList.add('active');

            // Categories
            const cats = d.categories ? d.categories.split(',') : ['MEMBER'];
            let roleOpt = `<option value="">SELECT ROLE</option>`;
            cats.forEach(c => roleOpt += `<option value="${c.trim()}">${c.trim()}</option>`);
            document.getElementById('mRoleSelect').innerHTML = roleOpt;
            renderMembers();
        });

        function selectStyle(s) {
            selectedStyle = s;
            document.querySelectorAll('.style-option').forEach(opt => opt.classList.remove('active'));
            document.getElementById('s_' + s).classList.add('active');
        }

        async function saveConfig() {
            await db.ref('config').update({
                name: document.getElementById('confName').value,
                desc: document.getElementById('confDesc').value,
                logo: document.getElementById('confLogo').value,
                color: document.getElementById('confColor').value,
                musicUrl: document.getElementById('confMusic').value,
                autoplay: document.getElementById('confAutoplay').checked,
                cardStyle: selectedStyle
            });
            showAlert("Settings Updated");
        }

        // --- Member Management ---
        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `<div style="display:flex; justify-content:space-between; padding:10px; background:#111; margin-bottom:5px; border-radius:8px; font-size:0.7rem;">
                    <span>${m.name}</span>
                    <div>
                        <i class="fa-solid fa-pen" onclick="editMember('${id}')" style="margin-right:10px; cursor:pointer; color:var(--accent);"></i>
                        <i class="fa-solid fa-trash" onclick="deleteMember('${id}')" style="cursor:pointer; color:red;"></i>
                    </div>
                </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            document.getElementById('countNum').innerText = allMembers.length;
            renderMembers();
        });

        function renderMembers() {
            const list = document.getElementById('memberList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => m.name.toLowerCase().includes(search));
            
            list.innerHTML = filtered.map(m => {
                let cardClass = "member-card";
                if(selectedStyle === 'modern') cardClass += " card-modern";
                if(selectedStyle === 'minimal') cardClass += " card-minimal";

                return `
                <div class="${cardClass}">
                    <div class="avatar-wrapper">
                        <img src="${m.image || 'https://ui-avatars.com/api/?name='+m.name}" alt="">
                    </div>
                    <div style="flex:1; min-width:0;">
                        <h4 class="m-name ${m.glow ? 'glow-text' : ''}">${m.name}</h4>
                        <p style="font-size:0.6rem; color:var(--accent); font-weight:700;">${m.role}</p>
                        ${m.facebook ? `<a href="${m.facebook}" target="_blank" style="color:white; opacity:0.3; font-size:0.8rem;"><i class="fa-brands fa-facebook"></i></a>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('mName').value,
                role: document.getElementById('mRoleSelect').value,
                image: document.getElementById('mImg').value,
                facebook: document.getElementById('mFB').value,
                glow: document.getElementById('mGlow').checked
            };
            if(!data.name) return alert("Need name");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
            showAlert("Member Saved");
        }

        function editMember(id) {
            const m = allMembers.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mRoleSelect').value = m.role;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            document.getElementById('mGlow').checked = m.glow;
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER";
        }

        async function deleteMember(id) { if(confirm("Delete?")) await db.ref('members/'+id).remove(); }
        function resetForm() {
            document.querySelectorAll('#adminPanel input:not([type=color])').forEach(i => i.value = '');
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').innerText = "ADD MEMBER";
        }
        function showAlert(m) { 
            const a = document.getElementById('customAlert'); a.innerText = m; a.style.display = 'block';
            setTimeout(() => a.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
