<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --glow-color: rgba(255, 255, 255, 0.5);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Custom Notification */
        #customAlert {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: var(--accent); color: #000; padding: 15px 30px;
            border-radius: 10px; font-weight: 700; display: none;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Nav & Structure */
        .member-count {
            position: fixed; top: 25px; left: 25px; z-index: 101;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px;
            background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 50px;
            backdrop-filter: blur(10px); border: 1px solid var(--border);
        }

        .top-nav {
            padding: 20px 5%; display: flex; justify-content: flex-end; gap: 25px;
            position: fixed; width: 100%; z-index: 100;
        }

        .nav-btn { color: #fff; text-decoration: none; cursor: pointer; font-size: 0.65rem; font-weight: 700; opacity: 0.5; transition: var(--transition); letter-spacing: 2px; }
        .nav-btn:hover { opacity: 1; text-shadow: 0 0 10px #fff; }

        .hero-section { padding: 150px 20px 40px; }
        .hero-title { font-family: 'Orbitron'; font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: 15px; text-transform: uppercase; }
        .hero-subtitle { font-size: 1rem; opacity: 0.6; margin-top: 10px; font-family: 'Inter'; }

        /* WELLESLEY Style Glow */
        .glow-text {
            text-shadow: 0 0 15px var(--glow-color), 0 0 30px var(--glow-color);
            color: #fff;
        }

        /* Category Filter Buttons */
        .category-container { display: flex; justify-content: center; gap: 15px; margin: 20px auto; flex-wrap: wrap; max-width: 800px; }
        .cat-btn {
            background: transparent; border: 1px solid var(--border); color: #fff;
            padding: 8px 25px; border-radius: 12px; cursor: pointer; font-size: 0.7rem;
            font-family: 'Orbitron'; transition: var(--transition); text-transform: uppercase;
        }
        .cat-btn.active { background: #fff; color: #000; }

        /* Grid System 3 per row */
        .grid-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 25px; padding: 40px 5%; max-width: 1400px; margin: 0 auto;
        }
        @media (max-width: 1024px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-container { grid-template-columns: 1fr; } }

        .member-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; 
            padding: 20px; display: flex; align-items: center; gap: 15px; transition: var(--transition);
            transform: scale(var(--card-scale, 1));
        }

        .avatar-wrapper { width: 65px; height: 65px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border); flex-shrink: 0; }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        /* Admin UI */
        .admin-window { background: #0d0d0d; width: 95%; max-width: 900px; height: 90vh; border-radius: 25px; border: 1px solid #222; display: flex; flex-direction: column; color: #eee; }
        .admin-body { padding: 30px; overflow-y: auto; flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .admin-section { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        input, select { background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; margin-bottom: 15px; }
        .music-player { position: fixed; bottom: 30px; right: 30px; z-index: 100; background: #fff; color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
    </style>
</head>
<body>

    <div id="customAlert">DONE!</div>
    <div class="member-count">MEMBER: <span id="countNum">0</span></div>

    <div class="music-player" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <nav class="top-nav">
        <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-lock"></i> ADMIN SYSTEM</a>
    </nav>

    <header class="hero-section" id="heroArea" style="text-align: center;">
        <img src="" alt="LOGO" class="main-logo" id="siteLogo">
        <h1 class="hero-title" id="siteNameDisplay">GHETTO</h1>
        <p class="hero-subtitle" id="siteDescDisplay">SITE DESCRIPTION</p>
    </header>

    <div class="search-box" style="text-align: center;">
        <input type="text" id="searchInput" placeholder="SEARCH MEMBER..." onkeyup="renderMembers()" style="width: 100%; max-width: 400px; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: #fff; text-align: center; outline: none;">
        <div class="category-container" id="categoryFilter">
            <button class="cat-btn active" onclick="filterCategory('ALL')">ALL</button>
        </div>
    </div>

    <div id="memberList" class="grid-container"></div>

    <div id="loginModal" class="modal">
        <div style="background:#1a1a1a; padding:40px; border-radius:20px; width:350px; text-align:center; border:1px solid #333;">
            <h2 style="margin-bottom:25px; font-family:'Orbitron';">LOGIN</h2>
            <input type="text" id="adminUser" placeholder="Email">
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="handleLogin()" style="background:var(--accent); color:black; border:none; width:100%; padding:15px; border-radius:10px; font-weight:700; cursor:pointer;">ENTER SYSTEM</button>
            <p onclick="closeModals()" style="margin-top:20px; cursor:pointer; font-size:0.7rem; opacity:0.5;">CANCEL</p>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-family:'Orbitron';">CENTRAL CONTROL</span>
                <i class="fa-solid fa-xmark" onclick="closeModals()" style="cursor:pointer;"></i>
            </div>
            <div class="admin-body">
                <div class="admin-section">
                    <h4 style="color:var(--accent); margin-bottom:15px;">WEB IDENTITY</h4>
                    <label>Site Name</label><input type="text" id="confName">
                    <label>Description</label><input type="text" id="confDesc">
                    <label>Description Size</label><input type="range" id="confDescSize" min="0.5" max="3" step="0.1">
                    <label>Alignment</label>
                    <select id="confAlign">
                        <option value="center">Center</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                    </select>
                    <label>Theme Color</label><input type="color" id="confColor">
                    <label>Glow Color (WELLESLEY)</label><input type="color" id="confGlow">
                    <label>Logo URL</label><input type="text" id="confLogo">
                    <label>Logo Size</label><input type="number" id="confLogoSize">
                    <button onclick="saveConfig()" style="width:100%; padding:12px; background:#fff; color:#000; border:none; border-radius:8px; font-weight:700; cursor:pointer;">SAVE CONFIG</button>
                </div>

                <div class="admin-section">
                    <h4 style="color:var(--accent); margin-bottom:15px;">CATEGORIES & SIZE</h4>
                    <label>Categories (Separate by comma)</label>
                    <input type="text" id="confCats" placeholder="LEADER,MEMBER,KODOMO">
                    <label>Card Scale (Size)</label><input type="range" id="confCardScale" min="0.5" max="1.5" step="0.1">
                    
                    <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                    
                    <h4 style="color:var(--accent); margin-bottom:15px;">MEMBER</h4>
                    <input type="hidden" id="editId">
                    <input type="text" id="mName" placeholder="Name">
                    <select id="mRoleSelect"></select>
                    <input type="text" id="mImg" placeholder="Image URL">
                    <input type="text" id="mFB" placeholder="Facebook URL">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                        <input type="checkbox" id="mGlow" style="width:auto; margin:0;"> <span>Enable Name Glow</span>
                    </div>
                    <button onclick="saveMember()" id="saveBtn" style="width:100%; padding:12px; background:var(--accent); color:black; border:none; border-radius:8px; font-weight:700; cursor:pointer;">ADD MEMBER</button>
                    
                    <div id="adminMemberList" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let siteConfig = {};
        let isAdmin = false;
        let currentFilter = 'ALL';

        function showAlert() {
            const al = document.getElementById('customAlert');
            al.style.display = 'block';
            setTimeout(() => { al.style.display = 'none'; }, 2000);
        }

        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        
        function handleLogin() {
            const u = document.getElementById('adminUser').value, p = document.getElementById('adminPass').value;
            if(u === 'ghett' && p === 'ghett9871') { isAdmin = true; closeModals(); openAdmin(); } else alert("FAIL");
        }

        // --- Config Logic ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            siteConfig = d;
            
            // Apply Site Styles
            document.documentElement.style.setProperty('--accent', d.color || '#ffc107');
            document.documentElement.style.setProperty('--glow-color', d.glow || 'rgba(255,255,255,0.5)');
            document.documentElement.style.setProperty('--card-scale', d.cardScale || 1);
            
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTO';
            document.getElementById('siteDescDisplay').innerText = d.desc || '';
            document.getElementById('siteDescDisplay').style.fontSize = (d.descSize || 1) + 'rem';
            document.getElementById('heroArea').style.textAlign = d.align || 'center';
            
            const logo = document.getElementById('siteLogo');
            logo.src = d.logo || '';
            logo.style.width = (d.logoSize || 120) + 'px';
            
            document.getElementById('bgMusic').src = d.music || '';
            
            // Sync Admin Inputs
            document.getElementById('confName').value = d.name || '';
            document.getElementById('confDesc').value = d.desc || '';
            document.getElementById('confColor').value = d.color || '#ffc107';
            document.getElementById('confGlow').value = d.glow || '#ffffff';
            document.getElementById('confLogo').value = d.logo || '';
            document.getElementById('confLogoSize').value = d.logoSize || 120;
            document.getElementById('confCats').value = d.categories || '';
            document.getElementById('confCardScale').value = d.cardScale || 1;

            // Render Categories
            const cats = d.categories ? d.categories.split(',') : [];
            let catHtml = `<button class="cat-btn ${currentFilter==='ALL'?'active':''}" onclick="filterCategory('ALL')">ALL</button>`;
            let roleOpt = `<option value="">SELECT ROLE</option>`;
            cats.forEach(c => {
                const clean = c.trim();
                catHtml += `<button class="cat-btn ${currentFilter===clean?'active':''}" onclick="filterCategory('${clean}')">${clean}</button>`;
                roleOpt += `<option value="${clean}">${clean}</option>`;
            });
            document.getElementById('categoryFilter').innerHTML = catHtml;
            document.getElementById('mRoleSelect').innerHTML = roleOpt;
        });

        async function saveConfig() {
            const data = {
                name: document.getElementById('confName').value,
                desc: document.getElementById('confDesc').value,
                descSize: document.getElementById('confDescSize').value,
                align: document.getElementById('confAlign').value,
                color: document.getElementById('confColor').value,
                glow: document.getElementById('confGlow').value,
                logo: document.getElementById('confLogo').value,
                logoSize: document.getElementById('confLogoSize').value,
                categories: document.getElementById('confCats').value,
                cardScale: document.getElementById('confCardScale').value,
                music: siteConfig.music || ''
            };
            await db.ref('config').set(data);
            showAlert();
        }

        // --- Member Logic ---
        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminHtml = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminHtml += `
                    <div style="background:#111; padding:10px; border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between; border:1px solid #222;">
                        <span>${m.name}</span>
                        <div>
                            <i class="fa-solid fa-pen" onclick="editMember('${id}')" style="cursor:pointer; margin-right:10px;"></i>
                            <i class="fa-solid fa-trash" onclick="deleteMember('${id}')" style="cursor:pointer; color:red;"></i>
                        </div>
                    </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            document.getElementById('countNum').innerText = allMembers.length;
            renderMembers();
        });

        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const matchSearch = m.name.toLowerCase().includes(search);
                const matchCat = (currentFilter === 'ALL' || m.role === currentFilter);
                return matchSearch && matchCat;
            });
            
            document.getElementById('memberList').innerHTML = filtered.map(m => `
                <div class="member-card">
                    <div class="avatar-wrapper"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'"></div>
                    <div>
                        <h4 class="${m.glow ? 'glow-text' : ''}" style="font-size:0.9rem;">${m.name}</h4>
                        <span style="font-size:0.6rem; color:var(--accent); font-weight:700;">${m.role || 'MEMBER'}</span>
                        <a href="${m.facebook}" target="_blank" style="margin-left:10px; color:#1877f2;"><i class="fa-brands fa-facebook"></i></a>
                    </div>
                </div>`).join('');
        }

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('mName').value,
                role: document.getElementById('mRoleSelect').value,
                image: document.getElementById('mImg').value,
                facebook: document.getElementById('mFB').value || '#',
                glow: document.getElementById('mGlow').checked
            };
            if(!data.name) return;
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            resetForm();
            showAlert();
        }

        function editMember(id) {
            const m = allMembers.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mRoleSelect').value = m.role;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            document.getElementById('mGlow').checked = m.glow;
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER";
        }

        async function deleteMember(id) { if(confirm("DELETE?")) { await db.ref('members/'+id).remove(); showAlert(); } }
        function resetForm() {
            document.getElementById('editId').value = '';
            document.querySelectorAll('#adminPanel input:not([type=range]):not([type=checkbox])').forEach(i => i.value = '');
            document.getElementById('mGlow').checked = false;
            document.getElementById('saveBtn').innerText = "ADD MEMBER";
        }

        function toggleMusic() {
            const a = document.getElementById('bgMusic'), i = document.getElementById('musicIcon');
            a.paused ? (a.play(), i.className='fa-solid fa-pause') : (a.pause(), i.className='fa-solid fa-play');
        }
    </script>
</body>
</html>
