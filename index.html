<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHETTOTROPHY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Bai+Jamjuree:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-secondary: #aaa;
            --fb-color: #00a2ed;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', 'Bai Jamjuree', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .top-nav {
            padding: 20px 5%;
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            position: fixed;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        .nav-btn { 
            color: #fff; 
            text-decoration: none; 
            cursor: pointer; 
            font-size: 0.75rem; 
            font-weight: 600; 
            opacity: 0.6;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .nav-btn:hover { opacity: 1; transform: translateY(-1px); }

        .hero-section { 
            text-align: center; 
            padding: 120px 20px 60px; 
            background: radial-gradient(circle at 50% 50%, #151515 0%, #050505 100%);
        }
        .main-logo { width: 110px; height: auto; margin-bottom: 25px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.15)); transition: 0.5s; }
        .hero-title { font-family: 'Orbitron'; font-size: 2.8rem; letter-spacing: 15px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; background: linear-gradient(to bottom, #fff 40%, #444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { font-size: 0.65rem; color: var(--text-secondary); letter-spacing: 8px; text-transform: uppercase; opacity: 0.8; }

        .container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 30px; }
        
        .search-area { margin-bottom: 50px; }
        .search-box { position: relative; max-width: 500px; margin: 0 auto 25px; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #555; }
        .search-box input { width: 100%; padding: 14px 20px 14px 50px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }

        .filter-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .f-btn { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; transition: var(--transition); }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; transform: translateY(-2px); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding-bottom: 80px; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 22px; display: flex; align-items: center; gap: 20px; transition: var(--transition); backdrop-filter: blur(5px); }
        .member-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-5px); background: rgba(30, 30, 30, 0.8); }
        .avatar-wrapper { width: 70px; height: 70px; border-radius: 50%; padding: 4px; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; overflow: hidden; }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); }
        .admin-window { background: #0a0a0a; width: 100%; max-width: 650px; max-height: 85vh; border-radius: 24px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; }
        .admin-body { padding: 25px; overflow-y: auto; }
        input, select { width: 100%; padding: 14px; background: #000; border: 1px solid #222; color: #fff; border-radius: 12px; margin-top: 8px; }
        .btn-main { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .member-card { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a class="nav-btn" onclick="setFilter('all')"><i class="fa-solid fa-globe"></i> ALL</a>
        <a class="nav-btn" onclick="setFilter('GHETTOTROPHY')"><i class="fa-solid fa-users"></i> GHETTOTROPHY</a>
        <a class="nav-btn" onclick="openAdmin()"><i class="fa-solid fa-shield-halved"></i> SYSTEM</a>
    </nav>

    <header class="hero-section">
        <img src="" alt="" class="main-logo" id="siteLogo">
        <h1 class="hero-title">GHETTOTROPHY</h1>
        <p class="hero-subtitle">Not a perfect gang but try to be the best.</p>
    </header>

    <div class="container">
        <div class="search-area">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search members..." onkeyup="renderMembers()">
            </div>
            <div class="filter-group" id="filterArea"></div>
        </div>
        <div id="memberList" class="grid-container"></div>
    </div>

    <div id="loginModal" class="modal">
        <div class="admin-window" style="max-width: 380px;">
            <div class="admin-body" style="text-align: center;">
                <h3 style="font-family: 'Orbitron'; margin-bottom: 20px;">SYSTEM ACCESS</h3>
                <input type="password" id="adminPass" placeholder="Password">
                <button class="btn-main" onclick="handleLogin()">LOGIN</button>
                <p onclick="closeModals()" style="margin-top: 20px; cursor: pointer; font-size: 0.7rem; opacity: 0.5;">CLOSE</p>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="admin-window">
            <div class="admin-body">
                <h3 style="font-family: 'Orbitron'; margin-bottom: 20px;">MEMBER MANAGEMENT</h3>
                <input type="hidden" id="editId">
                <input type="text" id="mName" placeholder="Name">
                <input type="text" id="mImg" placeholder="Avatar URL">
                <input type="text" id="mFB" placeholder="Facebook URL">
                <div id="mRoleCheckboxes" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                <button class="btn-main" id="saveBtn" onclick="saveMember()">SAVE MEMBER</button>
                <hr style="margin: 30px 0; border: 0; border-top: 1px solid #222;">
                <div id="adminMemberList"></div>
                <button class="btn-main" onclick="closeModals()" style="background: #222; color: #fff;">EXIT SYSTEM</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let currentFilter = 'all';
        let isAdmin = false;
        
        // แก้ไขหมวดหมู่ที่นี่
        const defaultCats = ["GHETTOTROPHY"]; 

        function openAdmin() { isAdmin ? document.getElementById('adminPanel').style.display='flex' : document.getElementById('loginModal').style.display='flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        
        function handleLogin() {
            if(document.getElementById('adminPass').value === 'demo912') { 
                isAdmin = true; closeModals(); openAdmin(); 
            } else { alert("Wrong Password"); }
        }

        function setFilter(role) {
            currentFilter = role;
            renderMembers();
            document.querySelectorAll('.f-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-role') === role);
            });
        }

        function renderCategories() {
            let filterHtml = `<button class="f-btn active" data-role="all" onclick="setFilter('all')">ALL</button>`;
            let checkHtml = '';
            defaultCats.forEach(name => {
                filterHtml += `<button class="f-btn" data-role="${name}" onclick="setFilter('${name}')">${name}</button>`;
                checkHtml += `<label style="font-size:0.7rem;"><input type="checkbox" name="roles" value="${name}" checked> ${name}</label>`;
            });
            document.getElementById('filterArea').innerHTML = filterHtml;
            document.getElementById('mRoleCheckboxes').innerHTML = checkHtml;
        }

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            let adminList = '';
            for(let id in data) {
                const m = {...data[id], id};
                allMembers.push(m);
                adminList += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:0.8rem; background: #111; padding: 10px; border-radius: 8px;">
                    <span>${m.name}</span>
                    <span style="display:flex; gap:15px;"><i class="fa-solid fa-pen" style="cursor:pointer;" onclick="editMember('${id}')"></i> <i class="fa-solid fa-trash" style="cursor:pointer; color:#ff4444;" onclick="deleteMember('${id}')"></i></span>
                </div>`;
            }
            document.getElementById('adminMemberList').innerHTML = adminList;
            renderMembers();
        });

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => {
                const roles = Array.isArray(m.role) ? m.role : [m.role];
                const matchesSearch = m.name.toLowerCase().includes(search);
                const matchesFilter = (currentFilter === 'all' || roles.includes(currentFilter));
                return matchesSearch && matchesFilter;
            });

            document.getElementById('memberList').innerHTML = filtered.map(m => `
                <div class="member-card">
                    <div class="avatar-wrapper"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/150'"></div>
                    <div class="member-info">
                        <h3 style="font-size:1.1rem; margin-bottom:5px;">${m.name}</h3>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span style="font-size:0.6rem; background:rgba(255,255,255,0.1); padding:3px 8px; border-radius:4px; letter-spacing:1px; color:var(--text-secondary);">${Array.isArray(m.role) ? m.role[0] : m.role}</span>
                            <a href="${m.facebook}" target="_blank" style="color:var(--fb-color); font-size:0.9rem;"><i class="fa-brands fa-facebook"></i></a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function saveMember() {
            const id = document.getElementById('editId').value;
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);
            const data = {
                name: document.getElementById('mName').value,
                role: roles.length > 0 ? roles : ["GHETTOTROPHY"],
                image: document.getElementById('mImg').value || 'https://via.placeholder.com/150',
                facebook: document.getElementById('mFB').value || '#'
            };
            if(!data.name) return alert("Please enter a name");
            id ? await db.ref('members/'+id).set(data) : await db.ref('members').push(data);
            alert("Success!"); resetForm();
        }

        function editMember(id) {
            const m = allMembers.find(i => i.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('mName').value = m.name;
            document.getElementById('mImg').value = m.image;
            document.getElementById('mFB').value = m.facebook;
            document.getElementById('saveBtn').innerText = "UPDATE MEMBER";
            
            // Set checkboxes
            const roles = Array.isArray(m.role) ? m.role : [m.role];
            document.querySelectorAll('input[name="roles"]').forEach(cb => {
                cb.checked = roles.includes(cb.value);
            });
        }

        async function deleteMember(id) { if(confirm("Delete this member?")) await db.ref('members/'+id).remove(); }
        function resetForm() { 
            document.getElementById('editId').value = '';
            document.getElementById('mName').value = '';
            document.getElementById('mImg').value = '';
            document.getElementById('mFB').value = '';
            document.getElementById('saveBtn').innerText = "SAVE MEMBER"; 
        }

        renderCategories();
    </script>
</body>
</html>
