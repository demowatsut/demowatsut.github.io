<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: rgba(17, 17, 17, 0.9);
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --fb-color: #1877f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--bg); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6; 
            transition: background 0.5s ease;
        }

        #weather-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 10000; }
        .notify { background: #202124; border-radius: 4px; padding: 12px 24px; color: #fff; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; margin-top: 10px; animation: slideUp 0.3s ease-out; min-width: 250px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 7000; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease; }
        .custom-modal { background: #1a1c1e; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }

        .top-nav { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .config-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-family: 'Orbitron'; cursor: pointer; transition: var(--transition); font-size: 11px; font-weight: bold; }
        .config-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }

        .hero { padding: 120px 20px 40px; text-align: center; animation: slideUp 0.8s ease; position: relative; z-index: 100; }
        .hero img { max-width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--accent)); transition: var(--transition); }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(24px, 5vw, 48px); letter-spacing: 8px; margin-bottom: 10px; color: var(--accent); text-transform: uppercase; }

        .filter-container { max-width: 700px; margin: 0 auto 50px; padding: 0 20px; position: relative; z-index: 100; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); }
        .search-box input { width: 100%; padding: 15px 15px 15px 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50px; color: #fff; transition: var(--transition); margin-bottom: 0; }
        .search-box input:focus { border-color: var(--accent); outline: none; background: rgba(255,255,255,0.08); }

        .category-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; transition: var(--transition); }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 193, 7, 0.3); }

        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 100; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; transition: var(--transition); position: relative; backdrop-filter: blur(5px); animation: fadeIn 0.5s ease; }
        .member-card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .avatar { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        
        .rank-tag { font-family: 'Orbitron'; font-size: 9px; font-weight: bold; padding: 3px 10px; border-radius: 4px; color: #000; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: inline-block; }
        .fb-link { color: var(--fb-color); font-size: 20px; margin-left: auto; transition: var(--transition); }

        .admin-panel { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 6000; overflow-y: auto; padding: 40px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .admin-card { background: #141414; padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px;}
        
        input, select { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; margin-bottom: 15px; font-family: 'Inter'; }
        label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 5px; font-family: 'Orbitron'; letter-spacing: 1px; }
        
        .btn-save { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; transition: 0.3s; }
        .btn-clear { background: #333 !important; color: #ccc !important; }

        .music-ctrl { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; transition: var(--transition); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .admin-mem-item { background:#000; padding:12px; margin-bottom:8px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #222;}
        .section-header { border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px; font-family: 'Orbitron'; font-size: 14px; color: #fff; }
    </style>
</head>
<body>

    <canvas id="weather-canvas"></canvas>
    <div id="notification-container"></div>
    <div id="yt-player-container" style="position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0;"><div id="player"></div></div>

    <div id="loginModal" class="modal-overlay">
        <div class="custom-modal" style="text-align: left;">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px; text-align: center;">ADMIN LOGIN</h2>
            <label>USERNAME</label><input type="text" id="loginUser">
            <label>PASSWORD</label><input type="password" id="loginPass">
            <button class="config-btn" style="width:100%; padding:12px;" onclick="attemptLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px;">
            MEMBERS: <span id="countNum" style="color:var(--accent)">0</span>
        </div>
        <button class="config-btn" onclick="openModal('loginModal')"><i class="fa-solid fa-shield-halved"></i> ADMIN</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay" style="font-family:'Orbitron'; font-size:10px; opacity:0.5; letter-spacing:5px;">MEMBER ROLE SYSTEM</p>
    </header>

    <div class="filter-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="memberSearch" placeholder="SEARCH MEMBER NAME..." oninput="filterMembers()">
        </div>
        <div id="categoryTabs" class="category-tabs"></div>
    </div>

    <div id="memberList" class="member-grid"></div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 30px;">
            <h2 style="font-family: 'Orbitron'; color: var(--accent);">ADMIN DASHBOARD</h2>
            <button class="config-btn" style="background:#ff4444; color:#fff;" onclick="closeAdminPanel()">CLOSE PANEL</button>
        </div>

        <div class="admin-grid">
            <div class="admin-card">
                <div class="section-header">SITE CONFIGURATION</div>
                <label>SITE NAME</label><input type="text" id="configSiteName">
                <label>DESCRIPTION</label><input type="text" id="configSiteDesc">
                <label>THEME COLOR</label><input type="color" id="configThemeColor" style="height:45px; padding:5px;">
                <label>LOGO URL</label><input type="text" id="configLogoUrl">
                <label>BACKGROUND URL</label><input type="text" id="configBgUrl">
                <label>WEATHER EFFECTS</label>
                <select id="configWeather">
                    <option value="none">OFF</option>
                    <option value="snow">SNOW</option>
                    <option value="rain">RAIN</option>
                    <option value="sun">SUNLIGHT</option>
                </select>
                <button class="btn-save" style="background:var(--accent);" onclick="saveConfig()">SAVE SETTINGS</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="admin-card">
                    <div class="section-header">ROLES & CATEGORIES</div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newRoleName" placeholder="Role Name" style="margin-bottom:0;">
                        <input type="color" id="newRoleColor" value="#ffc107" style="width:80px; height:45px; padding:5px; margin-bottom:0;">
                    </div>
                    <button class="btn-save" style="background:#fff; color:#000; margin-top:15px;" onclick="addRole()">+ ADD ROLE/CATEGORY</button>
                    <div id="roleListContainer" style="margin-top:15px; max-height: 200px; overflow-y: auto;"></div>
                </div>

                <div class="admin-card">
                    <div class="section-header">MUSIC SETTINGS</div>
                    <label>YOUTUBE VIDEO ID</label><input type="text" id="musicVidId" placeholder="เช่น dQw4w9WgXcQ">
                    <label>START TIME (SEC)</label><input type="number" id="musicStart" value="0">
                    <button class="btn-save" style="background:var(--accent);" onclick="saveMusic()">UPDATE MUSIC</button>
                </div>
            </div>

            <div class="admin-card" style="grid-column: 1 / -1;">
                <div class="section-header">MEMBER MANAGEMENT</div>
                <div class="admin-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <div>
                        <label>FULL NAME</label><input type="text" id="memName">
                        <label>AVATAR URL</label><input type="text" id="memImg">
                    </div>
                    <div>
                        <label>FACEBOOK LINK</label><input type="text" id="memFb">
                        <label>ROLE / CATEGORY</label><select id="memRole"></select>
                    </div>
                </div>
                <input type="hidden" id="editMemId">
                <div style="display: flex; gap: 10px;">
                    <button id="memBtn" class="btn-save" style="background:var(--accent); flex: 2;" onclick="saveMember()">ADD NEW MEMBER</button>
                    <button class="btn-save btn-clear" style="flex: 1;" onclick="clearMemForm()">CLEAR</button>
                </div>
                
                <h4 style="margin-top:30px; font-family:'Orbitron'; font-size:12px; color:var(--accent); border-bottom: 1px solid #222; padding-bottom: 10px;">MANAGE MEMBERS</h4>
                <div id="adminMemberList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player, currentRoles = {}, currentMembers = {}, activeTab = 'all';

        // --- Weather & Canvas ---
        const canvas = document.getElementById('weather-canvas'), ctx = canvas.getContext('2d');
        let particles = [], weatherType = 'none';

        function initWeather() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; if(weatherType === 'none') return;
            for(let i=0; i<100; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*2+1, size: Math.random()*3+1, opacity: Math.random() });
        }
        function drawWeather() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(weatherType !== 'none') {
                ctx.fillStyle = '#fff';
                particles.forEach(p => {
                    ctx.globalAlpha = p.opacity; ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                    p.y += p.v; if(p.y > canvas.height) p.y = -20;
                });
                requestAnimationFrame(drawWeather);
            }
        }

        // --- Real-time Site Config Update ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            // Display UI Update
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteDescDisplay').innerText = d.description || 'MEMBER ROLE SYSTEM';
            document.getElementById('siteLogo').src = d.logo || '';
            if(d.bgUrl) document.body.style.backgroundImage = `url('${d.bgUrl}')`;
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
            
            // Sync Admin Inputs (This keeps settings visible after close panel)
            document.getElementById('configSiteName').value = d.name || '';
            document.getElementById('configSiteDesc').value = d.description || '';
            document.getElementById('configThemeColor').value = d.themeColor || '#ffc107';
            document.getElementById('configLogoUrl').value = d.logo || '';
            document.getElementById('configBgUrl').value = d.bgUrl || '';
            document.getElementById('configWeather').value = d.weather || 'none';

            weatherType = d.weather || 'none'; initWeather(); drawWeather();
        });

        function saveConfig() {
            const data = {
                name: document.getElementById('configSiteName').value,
                description: document.getElementById('configSiteDesc').value,
                themeColor: document.getElementById('configThemeColor').value,
                logo: document.getElementById('configLogoUrl').value,
                bgUrl: document.getElementById('configBgUrl').value,
                weather: document.getElementById('configWeather').value
            };
            db.ref('config').set(data).then(() => showNotify("CONFIG SAVED"));
        }

        // --- Music Management ---
        db.ref('music').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('musicVidId').value = d.id || '';
            document.getElementById('musicStart').value = d.start || 0;
            // Update YouTube Player if exists
            if(player && d.id) {
                if(player.getVideoData && player.getVideoData().video_id !== d.id) {
                    player.loadVideoById({'videoId': d.id, 'startSeconds': parseInt(d.start)});
                }
            }
        });

        function saveMusic() {
            const data = {
                id: document.getElementById('musicVidId').value,
                start: document.getElementById('musicStart').value
            };
            if(!data.id) return showNotify("ID REQUIRED");
            db.ref('music').set(data).then(() => showNotify("MUSIC UPDATED"));
        }

        // --- Filter Logic ---
        function filterMembers() {
            const searchTerm = document.getElementById('memberSearch').value.toLowerCase();
            const grid = document.getElementById('memberList');
            let html = '';
            Object.keys(currentMembers).forEach(id => {
                const m = currentMembers[id];
                const role = currentRoles[m.roleId] || { name: 'MEMBER', color: '#888' };
                const matchSearch = m.name.toLowerCase().includes(searchTerm);
                const matchTab = (activeTab === 'all' || m.roleId === activeTab);
                if(matchSearch && matchTab) {
                    html += `
                    <div class="member-card">
                        <img src="${m.img || 'https://i.imgur.com/6VBx3io.png'}" class="avatar">
                        <div>
                            <div style="font-weight:600;">${m.name}</div>
                            <span class="rank-tag" style="background:${role.color}">${role.name}</span>
                        </div>
                        <a href="${m.fb}" target="_blank" class="fb-link"><i class="fa-brands fa-facebook"></i></a>
                    </div>`;
                }
            });
            grid.innerHTML = html || '<p style="grid-column:1/-1; text-align:center; opacity:0.5;">NO MEMBERS FOUND</p>';
        }

        function setActiveTab(tabId) { activeTab = tabId; renderTabs(); filterMembers(); }

        function renderTabs() {
            const container = document.getElementById('categoryTabs');
            let html = `<button class="tab-btn ${activeTab === 'all' ? 'active' : ''}" onclick="setActiveTab('all')">ALL</button>`;
            Object.keys(currentRoles).forEach(id => {
                html += `<button class="tab-btn ${activeTab === id ? 'active' : ''}" onclick="setActiveTab('${id}')">${currentRoles[id].name}</button>`;
            });
            container.innerHTML = html;
        }

        // --- Roles & Members Real-time ---
        db.ref('roles').on('value', snap => {
            currentRoles = snap.val() || {};
            let options = '<option value="">SELECT ROLE</option>', listHtml = '';
            Object.keys(currentRoles).forEach(id => {
                options += `<option value="${id}">${currentRoles[id].name}</option>`;
                listHtml += `
                <div class="admin-mem-item">
                    <span style="color:${currentRoles[id].color}">${currentRoles[id].name}</span>
                    <i class="fa-solid fa-trash" style="cursor:pointer; color:#ff4444" onclick="db.ref('roles').child('${id}').remove()"></i>
                </div>`;
            });
            document.getElementById('memRole').innerHTML = options;
            document.getElementById('roleListContainer').innerHTML = listHtml;
            renderTabs(); filterMembers();
        });

        db.ref('members').on('value', snap => {
            currentMembers = snap.val() || {};
            document.getElementById('countNum').innerText = Object.keys(currentMembers).length;
            let adminHtml = '';
            Object.keys(currentMembers).forEach(id => {
                const m = currentMembers[id];
                adminHtml += `<div class="admin-mem-item"><span>${m.name}</span><div><i class="fa-solid fa-pen-to-square" style="cursor:pointer; margin-right:10px;" onclick="editMember('${id}')"></i><i class="fa-solid fa-trash" style="cursor:pointer; color:#ff4444" onclick="db.ref('members').child('${id}').remove()"></i></div></div>`;
            });
            document.getElementById('adminMemberList').innerHTML = adminHtml;
            filterMembers();
        });

        // --- Admin Functions ---
        function attemptLogin() {
            if(document.getElementById('loginUser').value === 'ghett' && document.getElementById('loginPass').value === 'ghett9871') {
                closeModal('loginModal'); 
                document.getElementById('adminPanel').style.display = 'block';
                document.body.style.overflow = 'hidden';
            } else showNotify("ACCESS DENIED");
        }
        function closeAdminPanel() { 
            document.getElementById('adminPanel').style.display = 'none'; 
            document.body.style.overflow = 'auto';
        }
        function addRole() {
            const name = document.getElementById('newRoleName').value.toUpperCase();
            const color = document.getElementById('newRoleColor').value;
            if(name) db.ref('roles').push({ name, color }).then(() => { document.getElementById('newRoleName').value = ''; showNotify("ROLE ADDED"); });
        }
        function saveMember() {
            const id = document.getElementById('editMemId').value;
            const data = { name: document.getElementById('memName').value, img: document.getElementById('memImg').value, fb: document.getElementById('memFb').value, roleId: document.getElementById('memRole').value };
            if(!data.name) return showNotify("NAME REQUIRED");
            const ref = id ? db.ref('members').child(id) : db.ref('members').push();
            ref.set(data).then(() => { showNotify("SUCCESS"); clearMemForm(); });
        }
        function editMember(id) {
            const m = currentMembers[id];
            document.getElementById('editMemId').value = id;
            document.getElementById('memName').value = m.name;
            document.getElementById('memImg').value = m.img;
            document.getElementById('memFb').value = m.fb;
            document.getElementById('memRole').value = m.roleId;
            document.getElementById('memBtn').innerText = "UPDATE MEMBER";
        }
        function clearMemForm() {
            document.getElementById('editMemId').value = '';
            document.getElementById('memName').value = '';
            document.getElementById('memImg').value = '';
            document.getElementById('memFb').value = '';
            document.getElementById('memBtn').innerText = "ADD NEW MEMBER";
        }

        function showNotify(msg) {
            const t = document.createElement('div'); t.className = 'notify';
            t.innerHTML = `<i class="fa-solid fa-bell"></i> ${msg}`;
            document.getElementById('notification-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- YouTube API ---
        function onYouTubeIframeAPIReady() {
            db.ref('music').once('value', snap => {
                const d = snap.val(); if(!d || !d.id) return;
                player = new YT.Player('player', {
                    height: '0', width: '0', videoId: d.id,
                    playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': d.id, 'start': parseInt(d.start) || 0 }
                });
            });
        }
        function toggleMusic() {
            if(!player) return;
            const icon = document.getElementById('musicIcon');
            if(player.getPlayerState() === 1) { player.pauseVideo(); icon.className = 'fa-solid fa-play'; }
            else { player.playVideo(); icon.className = 'fa-solid fa-pause'; }
        }
    </script>
</body>
</html>
