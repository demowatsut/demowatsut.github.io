<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --fb-color: #1877f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- UI Elements --- */
        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 10000; }
        .notify { background: #202124; border-radius: 4px; padding: 12px 24px; color: #fff; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; margin-top: 10px; animation: slideUp 0.3s ease-out; min-width: 250px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 7000; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease; }
        .custom-modal { background: #1a1c1e; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }

        .top-nav { position: fixed; top: 0; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .config-btn { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-family: 'Orbitron'; cursor: pointer; transition: var(--transition); font-size: 11px; font-weight: bold; }
        .config-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }

        .hero { padding: 160px 20px 60px; text-align: center; animation: slideUp 0.8s ease; }
        .hero img { max-width: 140px; margin-bottom: 25px; filter: drop-shadow(0 0 20px var(--accent)); transition: var(--transition); }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(28px, 6vw, 60px); letter-spacing: 12px; margin-bottom: 10px; color: var(--accent); }

        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; transition: var(--transition); position: relative; }
        .member-card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .avatar { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        
        .rank-tag { font-family: 'Orbitron'; font-size: 9px; font-weight: bold; padding: 3px 10px; border-radius: 4px; color: #000; text-transform: uppercase; letter-spacing: 1px; }
        .fb-link { color: var(--fb-color); font-size: 20px; margin-left: auto; transition: var(--transition); }

        /* --- Admin Dashboard --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 6000; overflow-y: auto; padding: 40px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .admin-card { background: #141414; padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px;}
        input, select { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; margin-bottom: 15px; font-family: 'Inter'; }
        label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 5px; font-family: 'Orbitron'; letter-spacing: 1px; }
        .btn-save { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; transition: 0.3s; }

        /* --- Music Controller --- */
        .music-ctrl { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: var(--transition); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .music-ctrl:hover { transform: rotate(15deg) scale(1.1); }
        #yt-player-container { position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0; }

        .delete-btn { color: #ff4444; cursor: pointer; transition: 0.3s; }
        .delete-btn:hover { transform: scale(1.2); }
        .edit-btn { color: #44aaff; cursor: pointer; margin-right: 10px; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="notification-container"></div>
    <div id="yt-player-container"><div id="player"></div></div>

    <div id="customAlert" class="modal-overlay">
        <div class="custom-modal">
            <i id="alertIcon" class="fa-solid fa-circle-exclamation" style="font-size: 40px; color: var(--accent); margin-bottom: 20px;"></i>
            <h3 id="alertTitle" style="font-family: 'Orbitron'; margin-bottom: 10px;">MESSAGE</h3>
            <p id="alertMsg" style="font-size: 14px; opacity: 0.8; margin-bottom: 25px;">Details here...</p>
            <div id="alertButtons" style="display: flex; gap: 10px;">
                <button id="alertConfirmBtn" class="config-btn" style="flex: 1; padding: 12px;">OK</button>
                <button id="alertCancelBtn" class="config-btn" style="flex: 1; background: #333; color: #fff; display: none;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="custom-modal" style="text-align: left;">
            <h2 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px; text-align: center;">ADMIN LOGIN</h2>
            <label>USERNAME</label><input type="text" id="loginUser">
            <label>PASSWORD</label><input type="password" id="loginPass">
            <button class="config-btn" style="width:100%; padding:12px;" onclick="attemptLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px;">
            MEMBERS: <span id="countNum" style="color:var(--accent)">0</span>
        </div>
        <button class="config-btn" onclick="openModal('loginModal')"><i class="fa-solid fa-shield-halved"></i> ADMIN</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay" style="font-family:'Orbitron'; font-size:10px; opacity:0.5; letter-spacing:5px;">MEMBER ROLE SYSTEM</p>
    </header>

    <div id="memberList" class="member-grid"></div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 30px;">
            <h2 style="font-family: 'Orbitron'; color: var(--accent);">ADMIN DASHBOARD</h2>
            <button class="config-btn" style="background:#ff4444; color:#fff;" onclick="logoutAdmin()">CLOSE PANEL</button>
        </div>

        <div class="admin-grid">
            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-music"></i> MUSIC SETTING</h3>
                <label>YOUTUBE VIDEO ID</label>
                <input type="text" id="configMusicId" placeholder="เช่น PAMYc_MkqkM">
                <label>START TIME (SECONDS)</label>
                <input type="number" id="configMusicStart" placeholder="เช่น 40">
                <button class="btn-save" style="background:var(--accent);" onclick="saveMusicConfig()">UPDATE MUSIC</button>
            </div>

            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-link"></i> LINK & IMAGE UTILS</h3>
                <label>LINK NAME (สำหรับบันทึก)</label>
                <input type="text" id="utilLinkName" placeholder="เช่น โลโก้แก๊ง, รูปพื้นหลัง...">
                <label>URL</label>
                <input type="text" id="utilImageUrl" placeholder="วางลิงก์ที่นี่...">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                    <button class="btn-save" style="background:var(--accent); color:#000;" onclick="saveLink()">SAVE LINK</button>
                    <button class="btn-save" style="background:#fff; color:#000;" onclick="copyLinkToClipboard()">COPY LINK</button>
                </div>
                
                <div id="savedLinksContainer" style="max-height: 150px; overflow-y: auto; background: #000; padding: 10px; border-radius: 6px;">
                    </div>
            </div>

            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-gears"></i> SITE CONFIG</h3>
                <label>SITE NAME</label><input type="text" id="configSiteName">
                <label>DESCRIPTION</label><input type="text" id="configSiteDesc">
                <label>THEME COLOR</label><input type="color" id="configThemeColor" style="height:45px; padding:5px;">
                <label>LOGO URL</label><input type="text" id="configLogoUrl">
                <button class="btn-save" style="background:var(--accent);" onclick="saveConfig()">SAVE SITE</button>
            </div>

            <div class="admin-card">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-tags"></i> ROLES</h3>
                <input type="text" id="newRoleName" placeholder="Role Name">
                <input type="color" id="newRoleColor" value="#ffc107" style="height:40px;">
                <button class="btn-save" style="background:#fff; color:#000;" onclick="addRole()">ADD ROLE</button>
                <div id="roleListContainer" style="margin-top:15px;"></div>
            </div>

            <div class="admin-card" style="grid-column: 1 / -1;">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-bottom:15px; color:var(--accent);"><i class="fa-solid fa-users"></i> MEMBER MANAGEMENT</h3>
                <div class="admin-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <div>
                        <label>NAME</label><input type="text" id="memName">
                        <label>AVATAR URL</label><input type="text" id="memImg">
                    </div>
                    <div>
                        <label>FACEBOOK URL</label><input type="text" id="memFb">
                        <label>ASSIGN ROLE</label>
                        <select id="memRole"></select>
                    </div>
                </div>
                <input type="hidden" id="editMemId">
                <button id="memBtn" class="btn-save" style="background:var(--accent);" onclick="saveMember()">ADD NEW MEMBER</button>
                
                <div style="margin-top: 20px;">
                    <label>MANAGE EXISTING MEMBERS</label>
                    <div id="adminMemberList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player;
        let musicData = { id: 'PAMYc_MkqkM', start: 40 };
        let currentRoles = {};

        // --- YouTube Logic ---
        function onYouTubeIframeAPIReady() {
            db.ref('music').on('value', snap => {
                const d = snap.val();
                if(d) {
                    musicData = d;
                    if(player) {
                        player.loadVideoById({ videoId: musicData.id, startSeconds: parseInt(musicData.start) });
                        player.pauseVideo();
                    } else {
                        player = new YT.Player('player', {
                            height: '0', width: '0',
                            videoId: musicData.id,
                            playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': musicData.id, 'start': parseInt(musicData.start) },
                            events: { 'onReady': (e) => {} }
                        });
                    }
                }
            });
        }

        function toggleMusic() {
            const icon = document.getElementById('musicIcon');
            if(!player) return;
            if(player.getPlayerState() === 1) {
                player.pauseVideo();
                icon.className = 'fa-solid fa-play';
            } else {
                player.playVideo();
                icon.className = 'fa-solid fa-pause';
                showNotify("MUSIC STARTED");
            }
        }

        // --- Link & Image Management ---
        function saveLink() {
            const name = document.getElementById('utilLinkName').value;
            const url = document.getElementById('utilImageUrl').value;
            if(!name || !url) return showNotify("ENTER NAME AND URL");
            db.ref('saved_links').push({ name, url }).then(() => {
                showNotify("LINK SAVED");
                document.getElementById('utilLinkName').value = '';
                document.getElementById('utilImageUrl').value = '';
            });
        }

        function copyLinkToClipboard(urlParam) {
            const url = urlParam || document.getElementById('utilImageUrl').value;
            if(!url) return showNotify("NO URL TO COPY");
            navigator.clipboard.writeText(url).then(() => showNotify("LINK COPIED"));
        }

        db.ref('saved_links').on('value', snap => {
            const links = snap.val() || {};
            const container = document.getElementById('savedLinksContainer');
            container.innerHTML = Object.keys(links).map(id => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:5px; border-bottom:1px solid #222; font-size:11px;">
                    <span style="cursor:pointer; color:var(--accent)" onclick="document.getElementById('utilImageUrl').value='${links[id].url}'">${links[id].name}</span>
                    <div>
                        <i class="fa-solid fa-copy edit-btn" onclick="copyLinkToClipboard('${links[id].url}')"></i>
                        <i class="fa-solid fa-trash delete-btn" onclick="db.ref('saved_links').child('${id}').remove()"></i>
                    </div>
                </div>
            `).join('') || '<p style="font-size:10px; opacity:0.5; text-align:center;">NO SAVED LINKS</p>';
        });

        // --- Admin & Config ---
        function attemptLogin() {
            if(document.getElementById('loginUser').value === 'ghett' && document.getElementById('loginPass').value === 'ghett9871') {
                showNotify("WELCOME ADMIN");
                closeModal('loginModal');
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminData();
            } else {
                customAlert("ERROR", "WRONG USERNAME OR PASSWORD");
            }
        }

        function saveConfig() {
            const data = {
                name: document.getElementById('configSiteName').value,
                desc: document.getElementById('configSiteDescDisplay').innerText = document.getElementById('configSiteDesc').value,
                themeColor: document.getElementById('configThemeColor').value,
                logo: document.getElementById('configLogoUrl').value
            };
            db.ref('config').set(data).then(() => showNotify("SITE CONFIG SAVED"));
        }

        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteDescDisplay').innerText = d.desc || '';
            document.getElementById('siteLogo').src = d.logo || '';
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
        });

        // --- Roles Logic ---
        function addRole() {
            const name = document.getElementById('newRoleName').value;
            const color = document.getElementById('newRoleColor').value;
            if(!name) return;
            db.ref('roles').push({ name, color }).then(() => {
                document.getElementById('newRoleName').value = '';
                showNotify("ROLE ADDED");
            });
        }

        db.ref('roles').on('value', snap => {
            currentRoles = snap.val() || {};
            const container = document.getElementById('roleListContainer');
            const select = document.getElementById('memRole');
            
            let html = '';
            let options = '<option value="">NO ROLE</option>';
            
            Object.keys(currentRoles).forEach(id => {
                html += `
                    <div style="display:flex; justify-content:space-between; padding:8px; background:#000; margin-bottom:5px; border-radius:4px; font-size:12px;">
                        <span style="color:${currentRoles[id].color}">${currentRoles[id].name}</span>
                        <i class="fa-solid fa-trash delete-btn" onclick="db.ref('roles').child('${id}').remove()"></i>
                    </div>`;
                options += `<option value="${id}">${currentRoles[id].name}</option>`;
            });
            container.innerHTML = html;
            select.innerHTML = options;
        });

        // --- Member Logic ---
        function saveMember() {
            const id = document.getElementById('editMemId').value;
            const data = {
                name: document.getElementById('memName').value,
                img: document.getElementById('memImg').value,
                fb: document.getElementById('memFb').value,
                roleId: document.getElementById('memRole').value
            };
            if(!data.name) return showNotify("NAME REQUIRED");

            if(id) {
                db.ref('members').child(id).update(data).then(() => {
                    showNotify("MEMBER UPDATED");
                    resetMemForm();
                });
            } else {
                db.ref('members').push(data).then(() => {
                    showNotify("MEMBER ADDED");
                    resetMemForm();
                });
            }
        }

        function resetMemForm() {
            document.getElementById('editMemId').value = '';
            document.getElementById('memName').value = '';
            document.getElementById('memImg').value = '';
            document.getElementById('memFb').value = '';
            document.getElementById('memRole').value = '';
            document.getElementById('memBtn').innerText = 'ADD NEW MEMBER';
            document.getElementById('memBtn').style.background = 'var(--accent)';
        }

        function editMember(id, data) {
            document.getElementById('editMemId').value = id;
            document.getElementById('memName').value = data.name;
            document.getElementById('memImg').value = data.img;
            document.getElementById('memFb').value = data.fb;
            document.getElementById('memRole').value = data.roleId || '';
            document.getElementById('memBtn').innerText = 'UPDATE MEMBER';
            document.getElementById('memBtn').style.background = '#44aaff';
            showNotify("EDIT MODE ACTIVE");
        }

        db.ref('members').on('value', snap => {
            const members = snap.val() || {};
            const list = document.getElementById('memberList');
            const adminList = document.getElementById('adminMemberList');
            const count = Object.keys(members).length;
            document.getElementById('countNum').innerText = count;

            let mainHtml = '';
            let adminHtml = '';

            Object.keys(members).forEach(id => {
                const m = members[id];
                const role = currentRoles[m.roleId] || { name: 'NO ROLE', color: '#555' };
                
                mainHtml += `
                    <div class="member-card">
                        <img src="${m.img || 'https://i.imgur.com/6VBx3io.png'}" class="avatar">
                        <div>
                            <div style="font-weight:600; font-size:15px; margin-bottom:4px;">${m.name}</div>
                            <span class="rank-tag" style="background:${role.color}">${role.name}</span>
                        </div>
                        <a href="${m.fb}" target="_blank" class="fb-link"><i class="fa-brands fa-facebook"></i></a>
                    </div>`;

                adminHtml += `
                    <div style="background:#000; padding:10px; border-radius:6px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:12px;">${m.name}</span>
                        <div>
                            <i class="fa-solid fa-pen-to-square edit-btn" onclick='editMember("${id}", ${JSON.stringify(m)})'></i>
                            <i class="fa-solid fa-trash delete-btn" onclick="db.ref('members').child('${id}').remove()"></i>
                        </div>
                    </div>`;
            });
            list.innerHTML = mainHtml;
            adminList.innerHTML = adminHtml;
        });

        // --- Helpers ---
        function showNotify(msg) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'notify';
            toast.innerHTML = `<i class="fa-solid fa-circle-check" style="color:var(--accent)"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logoutAdmin() { location.reload(); }
        function customAlert(title, msg) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMsg').innerText = msg;
            openModal('customAlert');
            document.getElementById('alertConfirmBtn').onclick = () => closeModal('customAlert');
        }
    </script>
</body>
</html>
