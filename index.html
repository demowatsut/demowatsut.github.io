<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            /* ปรับความสมูทให้มีความลึกมากขึ้น */
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
            scroll-behavior: smooth;
        }
        
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Animations --- */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes neonGlow {
            0%, 100% { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
            50% { text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent), 0 0 60px var(--accent); }
        }

        /* --- Custom Notification UI --- */
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .notify {
            background: #1a1a1a;
            border-left: 4px solid var(--accent);
            padding: 16px 25px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Orbitron';
            font-size: 13px;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transition: var(--transition);
        }

        /* --- Header & Navigation --- */
        .top-nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(10,10,10,0.8), transparent);
            backdrop-filter: blur(10px);
        }

        .db-badge {
            font-family: 'Orbitron';
            font-size: 10px;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .config-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 11px;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: var(--transition);
        }

        .config-btn:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        /* --- Hero Section --- */
        .hero {
            padding: 160px 20px 60px;
            text-align: center;
            animation: reveal 1.2s ease;
        }

        .hero img { 
            max-width: 220px; 
            margin-bottom: 30px; 
            filter: drop-shadow(0 0 20px rgba(255,193,7,0.2));
            transition: var(--transition); 
        }
        
        .hero h1 { 
            font-family: 'Orbitron'; 
            font-size: clamp(30px, 8vw, 64px); 
            letter-spacing: 15px; 
            margin-bottom: 15px;
            font-weight: 700;
            transition: var(--transition);
        }

        /* Class สำหรับเปิดแสง */
        .glow-active {
            animation: neonGlow 2s infinite ease-in-out;
            color: var(--accent);
        }

        .hero p { opacity: 0.5; font-size: 12px; letter-spacing: 5px; text-transform: uppercase; }

        /* --- Search & Filter --- */
        .filter-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-bottom: 60px;
        }

        #searchInput {
            width: 100%;
            max-width: 500px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 18px 30px;
            border-radius: 40px;
            color: #fff;
            font-family: 'Inter';
            outline: none;
            transition: var(--transition);
            text-align: center;
            font-size: 14px;
        }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 30px rgba(255,193,7,0.15); transform: scale(1.02); }

        .cat-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #666;
            padding: 10px 28px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .cat-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* --- Member Grid --- */
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 0 8% 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .member-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .member-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            background: #161616;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar {
            width: 75px; height: 75px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.05);
            transition: var(--transition);
        }
        .member-card:hover .avatar { border-color: var(--accent); }

        .m-info h3 { font-family: 'Orbitron'; font-size: 16px; margin-bottom: 6px; color: #eee; }
        .m-info p { font-size: 10px; opacity: 0.4; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        /* --- Modals --- */
        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000;
            transition: var(--transition);
        }

        .login-box {
            background: #0f0f0f;
            padding: 50px 40px;
            border-radius: 30px;
            width: 90%; max-width: 420px;
            border: 1px solid #222;
            text-align: center;
            animation: reveal 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-box h2 { font-family: 'Orbitron'; margin-bottom: 35px; letter-spacing: 4px; font-size: 20px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 11px; opacity: 0.4; margin-bottom: 10px; margin-left: 12px; font-family: 'Orbitron'; }
        
        .login-box input {
            width: 100%;
            background: #161616;
            border: 1px solid #222;
            padding: 16px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: var(--transition);
        }
        .login-box input:focus { border-color: var(--accent); background: #1a1a1a; }

        .login-btn {
            width: 100%;
            background: var(--accent);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 14px;
            margin-top: 25px;
            cursor: pointer;
            transition: var(--transition);
        }
        .login-btn:hover { filter: brightness(1.2); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,193,7,0.2); }

        /* --- Music Controller --- */
        .music-ctrl {
            position: fixed; bottom: 40px; right: 40px;
            width: 55px; height: 55px;
            background: var(--accent); color: #000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition);
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .music-ctrl:hover { transform: rotate(15deg) scale(1.1); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <nav class="top-nav">
        <div class="db-badge">DATABASE: <span id="countNum">0</span></div>
        <button class="config-btn" onclick="openAdmin()"><i class="fa-solid fa-gear"></i> CONFIG</button>
    </nav>

    <header class="hero">
        <img src="" alt="" id="siteLogo" onerror="this.style.display='none'">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay">NOT A PERFECT GANG BUT TRY TO BE THE BEST.</p>
    </header>

    <section class="filter-container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="SEARCH MEMBER NAME..." onkeyup="renderMembers()">
        </div>
        <div class="category-grid" id="categoryGrid">
            <button class="cat-btn active" onclick="filterCat('ALL')">ALL</button>
        </div>
    </section>

    <div id="memberList" class="member-grid"></div>

    <div id="loginModal" class="modal">
        <div class="login-box">
            <h2>ADMIN ACCESS</h2>
            <div class="input-group">
                <label>IDENTIFIER</label>
                <input type="text" id="adminUser" placeholder="Username">
            </div>
            <div class="input-group">
                <label>PASSKEY</label>
                <input type="password" id="adminPass" placeholder="••••••••">
            </div>
            <button class="login-btn" onclick="handleLogin()">AUTHORIZE</button>
            <p onclick="closeModals()" style="margin-top:25px; font-size:10px; opacity:0.3; cursor:pointer; font-family: 'Orbitron';">CLOSE TERMINAL</p>
        </div>
    </div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [], siteConfig = {}, currentCat = 'ALL';

        // --- Custom Notify System ---
        function showNotify(msg, type = 'success') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'notify';
            if(type === 'error') toast.style.borderColor = '#ff4444';
            
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // --- Auth ---
        function openAdmin() { 
            document.getElementById('loginModal').style.display = 'flex'; 
        }
        function closeModals() { 
            document.getElementById('loginModal').style.display = 'none'; 
        }
        
        function handleLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'ghett9871') {
                showNotify("ACCESS GRANTED. REDIRECTING...");
                setTimeout(() => { window.location.href = "admin.html"; }, 1000);
            } else {
                showNotify("INVALID PASSKEY", "error");
            }
        }

        // --- Data Handling ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {}; siteConfig = d;
            const nameEl = document.getElementById('siteNameDisplay');
            
            nameEl.innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteDescDisplay').innerText = d.desc || '';
            
            if(d.logo) document.getElementById('siteLogo').src = d.logo;
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
            
            // ติ๊กเปิด-ปิดแสงจาก Firebase (ใช้ field: glowActive เป็น boolean)
            if(d.glowActive) {
                nameEl.classList.add('glow-active');
            } else {
                nameEl.classList.remove('glow-active');
            }
            
            // Build Categories
            const cats = d.categories ? d.categories.split(',') : [];
            let catHtml = `<button class="cat-btn ${currentCat==='ALL'?'active':''}" onclick="filterCat('ALL')">ALL</button>`;
            cats.forEach(c => {
                const name = c.trim().toUpperCase();
                if(name) catHtml += `<button class="cat-btn ${currentCat===name?'active':''}" onclick="filterCat('${name}')">${name}</button>`;
            });
            document.getElementById('categoryGrid').innerHTML = catHtml;
        });

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            for(let id in data) allMembers.push({...data[id], id});
            document.getElementById('countNum').innerText = allMembers.length;
            renderMembers();
        });

        function filterCat(cat) {
            currentCat = cat;
            renderMembers();
        }

        function renderMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('memberList');
            
            const filtered = allMembers.filter(m => {
                const matchSearch = (m.name || "").toLowerCase().includes(search);
                const matchCat = currentCat === 'ALL' || (m.role && m.role.toUpperCase() === currentCat);
                return matchSearch && matchCat;
            });

            list.innerHTML = filtered.map((m, i) => `
                <div class="member-card" style="animation-delay: ${i * 0.05}s">
                    <img src="${m.image || 'https://via.placeholder.com/150'}" class="avatar" loading="lazy">
                    <div class="m-info">
                        <h3>${m.name}</h3>
                        <p>${m.role || 'MEMBER'}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleMusic() {
            const a = document.getElementById('bgMusic'), i = document.getElementById('musicIcon');
            if(a.paused) { 
                a.play().then(() => {
                    i.className = 'fa-solid fa-pause';
                    showNotify("MUSIC STARTED");
                }).catch(() => showNotify("PLEASE CLICK AGAIN", "error"));
            } else { 
                a.pause(); 
                i.className = 'fa-solid fa-play'; 
            }
        }
    </script>
</body>
</html>
