<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">GHETTOTROPHY</title>
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffc107;
            --bg: #0a0a0a;
            --card-bg: #111111;
            --input-bg: #1a1c1e;
            --border: rgba(255, 255, 255, 0.05);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.6; }

        /* --- Animations --- */
        @keyframes reveal { from { opacity: 0; transform: translateY(30px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
        
        /* --- Notification --- */
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .notify { background: #1a1a1a; border-left: 4px solid var(--accent); padding: 16px 25px; border-radius: 8px; color: #fff; font-family: 'Orbitron'; font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; animation: reveal 0.5s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- UI Elements --- */
        .top-nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: linear-gradient(to bottom, rgba(10,10,10,0.8), transparent); backdrop-filter: blur(10px); }
        .config-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 10px 20px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; transition: var(--transition); font-size: 11px; }
        .config-btn:hover { background: var(--accent); color: #000; }

        .hero { padding: 160px 20px 60px; text-align: center; }
        .hero img { max-width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--accent)); }
        .hero h1 { font-family: 'Orbitron'; font-size: clamp(30px, 8vw, 64px); letter-spacing: 15px; margin-bottom: 10px; color: var(--accent); }

        /* --- Member Grid --- */
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; }
        .member-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 15px; transition: var(--transition); text-decoration: none; color: inherit; }
        .member-card:hover { border-color: var(--accent); transform: translateY(-5px); background: #161616; }
        .avatar { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .fb-link { margin-left: auto; color: #4267B2; font-size: 20px; transition: 0.3s; }
        .fb-link:hover { transform: scale(1.2); color: var(--accent); }

        /* --- Admin Panel (Hidden by default) --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #0a0a0a; z-index: 3000; overflow-y: auto; padding: 40px; }
        .admin-header { display: flex; justify-content: space-between; margin-bottom: 40px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .admin-card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 8px; font-family: 'Orbitron'; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; }
        .btn-save { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
        .btn-delete { background: #ff4444; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px; }

        /* --- Music Controller --- */
        .music-ctrl { position: fixed; bottom: 40px; right: 40px; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <nav class="top-nav">
        <div class="db-badge" style="font-family: 'Orbitron'; font-size: 10px;">MEMBERS: <span id="countNum">0</span></div>
        <button class="config-btn" onclick="openAdmin()"><i class="fa-solid fa-lock"></i> ADMIN</button>
    </nav>

    <header class="hero">
        <img src="" id="siteLogo" alt="Logo" onerror="this.style.display='none'">
        <h1 id="siteNameDisplay">GHETTOTROPHY</h1>
        <p id="siteDescDisplay">ADMIN CONTROL SYSTEM</p>
    </header>

    <div id="memberList" class="member-grid"></div>

    <div class="music-ctrl" onclick="toggleMusic()">
        <i id="musicIcon" class="fa-solid fa-play"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h2 style="font-family: 'Orbitron';">CORE SYSTEM SETTINGS</h2>
            <button class="config-btn" onclick="closeAdmin()">EXIT & REFRESH</button>
        </div>

        <div class="admin-grid">
            <div class="admin-card">
                <h3>SITE CONFIGURATION</h3><br>
                <label>SITE NAME</label>
                <input type="text" id="editSiteName" placeholder="Web Name">
                <label>SITE DESCRIPTION</label>
                <input type="text" id="editSiteDesc" placeholder="Description">
                <label>LOGO URL (TOP CENTER)</label>
                <input type="text" id="editLogoUrl" placeholder="https://image-link.png">
                <label>FAVICON URL</label>
                <input type="text" id="editFavicon" placeholder="https://link.ico">
                <label>THEME COLOR (HEX)</label>
                <input type="color" id="editThemeColor" style="height: 50px;">
                <label>BACKGROUND MUSIC URL (.mp3)</label>
                <input type="text" id="editMusicUrl" placeholder="https://server.com/music.mp3">
                <button class="btn-save" onclick="saveConfig()">UPDATE SITE</button>
            </div>

            <div class="admin-card">
                <h3>MEMBER MANAGEMENT</h3><br>
                <div style="background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                    <label>NEW MEMBER NAME</label>
                    <input type="text" id="newMemName">
                    <label>AVATAR URL</label>
                    <input type="text" id="newMemImg">
                    <label>FACEBOOK LINK</label>
                    <input type="text" id="newMemFB">
                    <button class="btn-save" style="width: 100%;" onclick="addMember()">ADD MEMBER</button>
                </div>
                
                <div id="adminMemberList" style="max-height: 300px; overflow-y: auto;">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = { databaseURL: "https://demoadmin-a4b1f-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMembers = [];
        let siteConfig = {};

        // --- Notification ---
        function showNotify(msg) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'notify';
            toast.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // --- Auth & Panel Control ---
        function openAdmin() {
            const pass = prompt("ENTER ADMIN PASSKEY:");
            if(pass === 'ghett9871') {
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminData();
            } else {
                alert("ACCESS DENIED");
            }
        }
        function closeAdmin() { location.reload(); }

        // --- Data Loading ---
        db.ref('config').on('value', snap => {
            const d = snap.val() || {};
            siteConfig = d;
            document.getElementById('siteNameDisplay').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('pageTitle').innerText = d.name || 'GHETTOTROPHY';
            document.getElementById('siteDescDisplay').innerText = d.desc || '';
            document.getElementById('siteLogo').src = d.logo || '';
            document.getElementById('favicon').href = d.favicon || '';
            document.getElementById('bgMusic').src = d.music || '';
            if(d.themeColor) document.documentElement.style.setProperty('--accent', d.themeColor);
        });

        db.ref('members').on('value', snap => {
            allMembers = [];
            const data = snap.val();
            for(let id in data) allMembers.push({...data[id], id});
            document.getElementById('countNum').innerText = allMembers.length;
            renderMembers();
            renderAdminMembers();
        });

        // --- Render Functions ---
        function renderMembers() {
            const list = document.getElementById('memberList');
            list.innerHTML = allMembers.map(m => `
                <div class="member-card">
                    <img src="${m.image || 'https://via.placeholder.com/150'}" class="avatar">
                    <div class="m-info">
                        <h3 style="font-family: 'Orbitron'; font-size: 14px;">${m.name}</h3>
                    </div>
                    ${m.facebook ? `<a href="${m.facebook}" target="_blank" class="fb-link"><i class="fa-brands fa-facebook"></i></a>` : ''}
                </div>
            `).join('');
        }

        function renderAdminMembers() {
            const list = document.getElementById('adminMemberList');
            list.innerHTML = allMembers.map(m => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #222;">
                    <span>${m.name}</span>
                    <button class="btn-delete" onclick="deleteMember('${m.id}')">DELETE</button>
                </div>
            `).join('');
        }

        // --- Admin Actions ---
        function loadAdminData() {
            document.getElementById('editSiteName').value = siteConfig.name || '';
            document.getElementById('editSiteDesc').value = siteConfig.desc || '';
            document.getElementById('editLogoUrl').value = siteConfig.logo || '';
            document.getElementById('editFavicon').value = siteConfig.favicon || '';
            document.getElementById('editThemeColor').value = siteConfig.themeColor || '#ffc107';
            document.getElementById('editMusicUrl').value = siteConfig.music || '';
        }

        function saveConfig() {
            const updates = {
                name: document.getElementById('editSiteName').value,
                desc: document.getElementById('editSiteDesc').value,
                logo: document.getElementById('editLogoUrl').value,
                favicon: document.getElementById('editFavicon').value,
                themeColor: document.getElementById('editThemeColor').value,
                music: document.getElementById('editMusicUrl').value
            };
            db.ref('config').update(updates).then(() => showNotify("SITE UPDATED"));
        }

        function addMember() {
            const name = document.getElementById('newMemName').value;
            const img = document.getElementById('newMemImg').value;
            const fb = document.getElementById('newMemFB').value;
            if(!name) return alert("NAME REQUIRED");
            db.ref('members').push({ name, image: img, facebook: fb }).then(() => {
                showNotify("MEMBER ADDED");
                document.getElementById('newMemName').value = '';
                document.getElementById('newMemImg').value = '';
                document.getElementById('newMemFB').value = '';
            });
        }

        function deleteMember(id) {
            if(confirm('REMOVE THIS MEMBER?')) {
                db.ref('members').child(id).remove().then(() => showNotify("MEMBER REMOVED"));
            }
        }

        // --- Music Control ---
        function toggleMusic() {
            const a = document.getElementById('bgMusic'), i = document.getElementById('musicIcon');
            if(a.paused) { 
                a.play().then(() => {
                    i.className = 'fa-solid fa-pause';
                    showNotify("PLAYING MUSIC");
                }).catch(e => alert("Please add a valid Music URL in Config first."));
            } else { 
                a.pause(); 
                i.className = 'fa-solid fa-play'; 
            }
        }
    </script>
</body>
</html>
